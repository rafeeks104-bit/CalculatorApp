name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk wget
          pip install --upgrade pip
          pip install buildozer cython==0.29.37

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ || true
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROIDSDK=$HOME/android-sdk" >> $GITHUB_ENV
          echo "PATH=$HOME/android-sdk/cmdline-tools/latest/bin:$PATH" >> $GITHUB_ENV

      - name: Install Android tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "build-tools;35.0.0" "platforms;android-35"

      - name: Find and link AIDL
        run: |
          AIDL_PATH=$(find $HOME/android-sdk -name aidl | head -1)
          echo "Found AIDL: $AIDL_PATH"
          sudo ln -sf $AIDL_PATH /usr/local/bin/aidl
          aidl --version

      - name: Build APK
        run: |
          sed -i '/android.sdk_path/d' buildozer.spec
          sed -i '/android.ndk_path/d' buildozer.spec
          echo "android.sdk_path = $HOME/android-sdk" >> buildozer.spec
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CalculatorApp-APK
          path: bin/*.apk
