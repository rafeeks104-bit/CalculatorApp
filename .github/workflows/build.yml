name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk
          pip install --upgrade pip
          pip install buildozer cython==0.29.37

      - name: Setup Android SDK path
        run: |
          mkdir -p $HOME/android-sdk
          mkdir -p $HOME/android-ndk
          chmod -R 777 $HOME/android-sdk
          chmod -R 777 $HOME/android-ndk
          echo "ANDROIDSDK=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROIDNDK=$HOME/android-ndk" >> $GITHUB_ENV

      - name: Install Android SDK tools
        run: |
          yes | $ANDROIDSDK/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROIDSDK/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;35.0.0" "platforms;android-35"

      - name: Build APK
        run: |
          sed -i '/android.sdk_path/d' buildozer.spec
          sed -i '/android.ndk_path/d' buildozer.spec
          echo "android.sdk_path = $HOME/android-sdk" >> buildozer.spec
          echo "android.ndk_path = $HOME/android-ndk" >> buildozer.spec
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CalculatorApp-APK
          path: bin/*.apk
