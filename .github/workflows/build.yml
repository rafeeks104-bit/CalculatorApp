name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk android-sdk android-sdk-platform-tools android-sdk-build-tools
          pip install --upgrade pip
          pip install buildozer cython==0.29.37

      - name: Setup Android SDK path
        run: |
          echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
          echo "ANDROIDSDK=/usr/lib/android-sdk" >> $GITHUB_ENV
          echo "ANDROIDNDK=$HOME/android-ndk" >> $GITHUB_ENV

      - name: Find AIDL
        run: |
          find /usr -name aidl 2>/dev/null || true

      - name: Setup AIDL path
        run: |
          AIDL_PATH=$(find /usr -name aidl 2>/dev/null | head -1)
          echo "AIDL=$AIDL_PATH" >> $GITHUB_ENV

      - name: Build APK
        run: |
          sed -i '/android.sdk_path/d' buildozer.spec
          sed -i '/android.ndk_path/d' buildozer.spec
          echo "android.sdk_path = /usr/lib/android-sdk" >> buildozer.spec
          echo "android.ndk_path = $HOME/android-ndk" >> buildozer.spec
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CalculatorApp-APK
          path: bin/*.apk
